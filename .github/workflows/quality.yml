name: Quality Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test secure commerce rules
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Dependency security gate
        run: npm run security:audit

      - name: Build Cloudflare production worker
        run: npm run build:cloudflare
        env:
          WRANGLER_SEND_METRICS: "false"
